    # ===================================================================
    # Server Configuration (Railway dynamic PORT mapping)
    # ===================================================================
    server.port=${PORT:8080}

    # ===================================================================
    # Frontend Origin & CORS Configuration
    # ===================================================================
    app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

    # ===================================================================
    # Database Configuration (Railway MySQL Service with local fallback)
    # ===================================================================
    spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
    spring.datasource.username=${MYSQLUSER}
    spring.datasource.password=${MYSQLPASSWORD}

    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.format_sql=true
    spring.sql.init.mode=never

    # ===================================================================
    # ActiveMQ Configuration (Railway ActiveMQ Service with local fallback)
    # ===================================================================
    spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:vm://localhost?broker.persistent=false&broker.useShutdownHook=false}
    spring.activemq.user=${ACTIVEMQ_USER:admin}
    spring.activemq.password=${ACTIVEMQ_PASSWORD:admin}
    spring.activemq.packages.trust-all=true
    spring.jms.pub-sub-domain=false

    # ===================================================================
    # Spring Mail (JavaMailSender) Configuration
    # ===================================================================
    spring.mail.host=smtp.gmail.com
    spring.mail.port=587
    spring.mail.username=${MAIL_USERNAME}
    spring.mail.password=${MAIL_PASSWORD}
    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true
    spring.mail.properties.mail.smtp.starttls.required=true

    # ===================================================================
    # Spring Security 6 Official Google OAuth 2.0 Client Configuration
    # ===================================================================
    spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
    spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
    spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/gmail.send
    spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

    spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
    spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
    spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
    spring.security.oauth2.client.provider.google.user-name-attribute=sub

    # ===================================================================
    # JWT & Security Secret Configurations
    # ===================================================================
    app.jwt.secret=${JWT_SECRET}
    app.jwt.expiration-ms=86400000

    # ===================================================================
    # Camunda BPM Configuration
    # ===================================================================
    camunda.bpm.admin-user.id=admin
    camunda.bpm.admin-user.password=admin
    camunda.bpm.admin-user.firstName=Admin
    camunda.bpm.database.type=mysql
    camunda.bpm.database.schema-update=true
    camunda.bpm.history-level=full
    camunda.bpm.auto-deployment-enabled=true
    camunda.bpm.default-serialization-format=application/json
    camunda.bpm.generic-properties.properties.enforce-history-time-to-live=false

    # ===================================================================
    # Logging Levels (DEBUG & TRACE for OAuth & Hibernate SQL)
    # ===================================================================
    logging.level.com.foodorder.backend=INFO
    logging.level.org.springframework.security=DEBUG
    logging.level.org.springframework.security.oauth2=DEBUG
    logging.level.org.hibernate.SQL=DEBUG
    logging.level.org.hibernate.orm.jdbc.bind=TRACE
    logging.level.org.camunda=WARN
    logging.level.org.springframework.jms=INFO

    server.forward-headers-strategy=framework
    server.tomcat.remoteip.protocol-header=x-forwarded-proto
    server.tomcat.remoteip.remote-ip-header=x-forwarded-for